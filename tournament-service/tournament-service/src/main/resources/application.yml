server:
  port: 8082

spring:
  application:
    name: tournament-service

  datasource:
    url: jdbc:postgresql://localhost:5432/tournament_db
    username: postgres
    password: YOUR_PASSWORD

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka