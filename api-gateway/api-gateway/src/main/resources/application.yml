server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**

            - id: tournament-service
              uri: lb://TOURNAMENT-SERVICE
              predicates:
                - Path=/tournaments/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka